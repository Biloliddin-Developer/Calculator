<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="ekran">
            <input class="input" type="text" placeholder="0" readonly>
        </div>
        <div class="buttons">
            <button class="C">C</button>
            <button class="bracketOn">(</button>
            <button class="bracketOff">)</button>
            <button class="Backspace">Backspace</button>
            <button class="kvadrat">x^2</button>
            <button class="factorial">x!</button>
            <button class="stepen">x^y</button>
            <button class="plus">+</button>
            <button class="one">1</button>
            <button class="two">2</button>
            <button class="three">3</button>
            <button class="minus">-</button>
            <button class="four">4</button>
            <button class="five">5</button>
            <button class="six">6</button>
            <button class="multiply">*</button>
            <button class="seven">7</button>
            <button class="eight">8</button>
            <button class="nine">9</button>
            <button class="divide">/</button>
            <button class="tochka">.</button>
            <button class="plusMinus">+/-</button>
            <button class="zero">0</button>
            <button class="equal">=</button>
        </div>
        <div class="list">
            <div class="history">

            </div>
            <div class="historyFooter">
                <button class="clearHistory">Очистить историю</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
